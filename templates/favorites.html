{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>我的收藏</h2>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for car in cars %}
        <div class="col">
            <div class="card h-100">
                <img src="/static/images/({{ car.image_index }}).jpg" class="car-image card-img-top" alt="{{ car.info.品牌 }} {{ car.info.车型 }}">
                <div class="card-body">
                    <h5 class="card-title">{{ car.info.品牌 }} {{ car.info.车型 }}</h5>
                    <p class="card-text">
                        价格：{{ car.info['价格(万元)'] }}万元<br>
                        能源类型：{{ car.info.能源类型 }}<br>
                        收藏时间：{{ car.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}
                    </p>
                    <div class="d-flex justify-content-between align-items-center">
                        <a href="/details/{{ car.info.品牌 }}/{{ car.info.车型 }}" class="btn btn-primary">查看详情</a>
                        <button class="btn btn-danger remove-favorite" 
                                data-brand="{{ car.info.品牌 }}" 
                                data-model="{{ car.info.车型 }}">
                            取消收藏
                        </button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    // 取消收藏
    $('.remove-favorite').click(function() {
        const brand = $(this).data('brand');
        const model = $(this).data('model');
        const card = $(this).closest('.col');
        
        $.ajax({
            url: `/api/favorites/${encodeURIComponent(brand)}/${encodeURIComponent(model)}`,
            method: 'DELETE',
            success: function(response) {
                if (response.success) {
                    // 移除卡片
                    card.fadeOut(400, function() {
                        $(this).remove();
                    });
                } else {
                    alert(response.message);
                }
            },
            error: function() {
                alert('操作失败，请稍后重试');
            }
        });
    });
});
</script>
{% endblock %}
